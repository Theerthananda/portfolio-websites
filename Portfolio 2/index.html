<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,viewport-fit=cover" />
  <title>Theerthananda — Dev Links</title>

  <!-- SEO / Social preview -->
  <meta name="description" content="Theerthananda — Programmer & Developer. Quick links: GitHub, LinkedIn, YouTube, Email. Professional dev landing page." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Theerthananda — Dev Links" />
  <meta property="og:description" content="Programmer • Developer • Tech Enthusiast — quick links and contact." />
  <meta property="og:image" content="https://theerthananda.github.io/me.JPG" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="theme-color" content="#0b72ff" />

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root{
      --accent: #0b72ff;        /* blue accent (light) */
      --accent-dark: #00eaff;   /* neon accent (dark) */
      --bg-dark-1: #05060c;
      --bg-dark-2: #0a0f1f;
      --card-dark: rgba(255,255,255,0.03);
      --muted-dark: rgba(255,255,255,0.78);
      --text-dark: #ffffff;
      --bg-light: #ffffff;
      --card-light: #f7fbff;
      --muted-light: #475569;
      --text-light: #0b1220;
      --glass-dark: rgba(0,255,255,0.08);
      --glass-light: rgba(11,114,255,0.10);
      --radius: 20px;
      --shadow-strong: 0 20px 60px rgba(2,6,23,0.7), 0 0 0 1px rgba(255,255,255,0.05);
      --shadow-soft: 0 10px 30px rgba(2,6,23,0.08), 0 0 0 1px rgba(11,114,255,0.05);
      --duration: 300ms;
    }

    /* Base */
    *{ box-sizing:border-box; }
    html{
      height:100%;
      margin:0;
      padding:0;
      overflow-x:hidden;
      -webkit-text-size-adjust:100%;
      -ms-text-size-adjust:100%;
    }
    html,body{height:100%;margin:0;font-family:'Poppins',system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;}
    body{
      display:flex;align-items:center;justify-content:center;
      padding:20px;
      padding-left:max(20px, env(safe-area-inset-left));
      padding-right:max(20px, env(safe-area-inset-right));
      padding-top:max(20px, env(safe-area-inset-top));
      padding-bottom:max(20px, env(safe-area-inset-bottom));
      background:
        radial-gradient(circle at 10% 10%, rgba(11,114,255,0.03), transparent 50%),
        radial-gradient(circle at 90% 90%, rgba(0,234,255,0.02), transparent 50%),
        linear-gradient(180deg,var(--bg-dark-1),var(--bg-dark-2));
      color:var(--text-dark);
      transition: background var(--duration) ease, color var(--duration) ease;
      -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
      overflow-x:hidden;
      min-height:100vh;
      min-height:-webkit-fill-available;
    }
    [data-theme="light"] body{
      background: 
        radial-gradient(circle at 10% 10%, rgba(11,114,255,0.02), transparent 50%),
        radial-gradient(circle at 90% 90%, rgba(0,234,255,0.01), transparent 50%),
        linear-gradient(180deg,var(--bg-light),#f3f9ff);
      color:var(--text-light);
    }

    /* Decorative floating orbs */
    .orb{ position:fixed; border-radius:50%; filter:blur(40px); opacity:0.12; pointer-events:none; transform:translateZ(0); z-index:0; will-change:transform; }
    .orb.orb-1{ width:450px;height:450px; left:-150px; top:-100px; background:linear-gradient(135deg,#00eaff,#5b9cff,#7b61ff); animation:float1 10s ease-in-out infinite; }
    .orb.orb-2{ width:350px;height:350px; right:-100px; bottom:-60px; background:linear-gradient(135deg,#7b61ff,#00eaff,#ff6b9d); animation:float2 14s ease-in-out infinite; }
    @keyframes float1{ 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(20px,15px) scale(1.05)} 66%{transform:translate(-10px,25px) scale(0.98)} }
    @keyframes float2{ 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(-15px,-20px) scale(0.95)} 66%{transform:translate(10px,-30px) scale(1.02)} }

    /* Card */
    .card{
      position:relative; z-index:2;
      width:100%; max-width:1000px; border-radius:var(--radius);
      padding:32px; display:flex; gap:32px; align-items:center;
      background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border:1px solid var(--glass-dark);
      box-shadow:var(--shadow-strong);
      transform-origin:center;
      transition: transform .35s cubic-bezier(.16,.84,.32,1), background var(--duration), box-shadow .35s ease;
      margin:0 auto;
    }
    [data-theme="light"] .card{
      background:linear-gradient(135deg, var(--card-light), #ffffff);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border:1px solid var(--glass-light); 
      box-shadow:var(--shadow-soft);
    }
    .card:hover{ transform:translateY(-8px) scale(1.01); box-shadow:0 25px 70px rgba(2,6,23,0.8), 0 0 0 1px rgba(255,255,255,0.08); }
    [data-theme="light"] .card:hover{ box-shadow:0 15px 40px rgba(2,6,23,0.12), 0 0 0 1px rgba(11,114,255,0.08); }

    /* Left profile (desktop) */
    .profile{ min-width:280px; display:flex; gap:20px; align-items:center; max-width:100%; }
    .avatar{ 
      width:130px;height:130px;border-radius:999px;overflow:hidden;
      border:4px solid rgba(11,114,255,0.15); 
      box-shadow:0 10px 30px rgba(2,6,23,0.5), 0 0 0 1px rgba(255,255,255,0.1);
      background:linear-gradient(180deg,#eaf6ff,#ffffff);
      transition: transform .3s ease, box-shadow .3s ease;
      position:relative;
    }
    .avatar::before{
      content:'';
      position:absolute;
      inset:-2px;
      border-radius:999px;
      padding:2px;
      background:linear-gradient(135deg, rgba(11,114,255,0.3), rgba(0,234,255,0.3));
      -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite:xor;
      mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite:exclude;
      opacity:0;
      transition:opacity .3s ease;
    }
    .avatar:hover::before{ opacity:1; }
    .avatar:hover{ transform:scale(1.05); box-shadow:0 15px 40px rgba(11,114,255,0.3), 0 0 0 1px rgba(255,255,255,0.15); }
    .avatar img{ width:100%; height:100%; object-fit:cover; display:block; }

    .meta{ display:flex; flex-direction:column; gap:8px; max-width:100%; word-wrap:break-word; }
    .name{ font-size:24px; font-weight:700; letter-spacing:.5px; margin:0; color:var(--text-dark); transition: color var(--duration); line-height:1.2; }
    [data-theme="light"] .name{ color:var(--text-light); }
    .role{ font-size:14px; color:var(--muted-dark); margin:0; transition: color var(--duration); line-height:1.4; }
    [data-theme="light"] .role{ color:var(--muted-light); }
    .location{ font-size:13px; color:rgba(255,255,255,0.65); margin:8px 0 0; transition: color var(--duration); line-height:1.5; }
    [data-theme="light"] .location{ color:rgba(71,85,105,0.8); }

    /* Right content */
    .right{ flex:1; display:flex; flex-direction:column; gap:20px; align-items:stretch; min-width:0; max-width:100%; }

    .typing{ font-size:16px; font-weight:700; color:var(--accent-dark); transition: color var(--duration); min-height:24px; letter-spacing:.3px; }
    [data-theme="light"] .typing{ color:var(--accent); }

    /* Links grid */
    .links{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:8px; width:100%; max-width:100%; }
    .btn{
      display:flex; align-items:center; justify-content:center; gap:12px;
      padding:14px 16px; border-radius:14px; text-decoration:none; font-weight:600;
      font-size:14px; letter-spacing:.2px;
      color:var(--accent-dark); 
      background: linear-gradient(135deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border:1px solid rgba(255,255,255,0.08); 
      min-height:56px;
      transition: all .25s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 4px 12px rgba(2,6,23,0.2), inset 0 1px 0 rgba(255,255,255,0.05);
      position:relative;
      overflow:hidden;
      width:100%;
      max-width:100%;
      word-break:break-word;
    }
    .btn::before{
      content:'';
      position:absolute;
      inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      opacity:0;
      transition:opacity .25s ease;
    }
    .btn:hover::before{ opacity:1; }
    [data-theme="light"] .btn{ 
      color:var(--accent); 
      border:1px solid rgba(11,114,255,0.08); 
      background:linear-gradient(135deg, #ffffff, #f8fbff);
      box-shadow: 0 2px 8px rgba(2,6,23,0.06), inset 0 1px 0 rgba(255,255,255,0.8);
    }

    /* neon hover by type */
    .btn:hover{ 
      transform:translateY(-4px) scale(1.02); 
      box-shadow:0 12px 32px rgba(2,6,23,0.35), inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .btn.github:hover{ 
      box-shadow:0 12px 36px rgba(11,114,255,0.15), 0 0 0 1px rgba(11,114,255,0.3); 
      border-color: rgba(11,114,255,0.3); 
      color:var(--accent); 
      background:linear-gradient(135deg, rgba(11,114,255,0.1), rgba(11,114,255,0.05));
    }
    .btn.linkedin:hover{ 
      box-shadow:0 12px 36px rgba(11,114,255,0.12), 0 0 0 1px rgba(11,114,255,0.25); 
      border-color: rgba(11,114,255,0.25); 
      color:var(--accent);
      background:linear-gradient(135deg, rgba(11,114,255,0.08), rgba(11,114,255,0.03));
    }
    .btn.instagram:hover{ 
      box-shadow:0 12px 36px rgba(225,48,108,0.15), 0 0 0 1px rgba(225,48,108,0.25); 
      border-color: rgba(225,48,108,0.25); 
      color:#e1306c;
      background:linear-gradient(135deg, rgba(225,48,108,0.1), rgba(225,48,108,0.05));
    }
    .btn.youtube:hover{ 
      box-shadow:0 12px 36px rgba(255,60,60,0.15), 0 0 0 1px rgba(255,60,60,0.25); 
      border-color: rgba(255,60,60,0.25); 
      color:#ff4b4b;
      background:linear-gradient(135deg, rgba(255,60,60,0.1), rgba(255,60,60,0.05));
    }
    .btn.email:hover{ 
      box-shadow:0 12px 36px rgba(0,200,120,0.12), 0 0 0 1px rgba(0,200,120,0.2); 
      border-color: rgba(0,200,120,0.2); 
      color:#00b37e;
      background:linear-gradient(135deg, rgba(0,200,120,0.08), rgba(0,200,120,0.03));
    }
    .btn:active{ transform:translateY(-2px) scale(0.98); }

    /* disabled resume */
    .resume-disabled{ opacity:0.5; pointer-events:none; filter:saturate(.5) grayscale(0.3); }

    /* info row */
    .info-row{ display:flex; gap:14px; align-items:center; flex-wrap:wrap; margin-top:10px; }
    .small{ 
      display:inline-flex; gap:8px; align-items:center; padding:10px 14px; border-radius:12px; 
      background:rgba(255,255,255,0.03); 
      color:var(--muted-dark); 
      border:1px solid rgba(255,255,255,0.06);
      font-size:13px;
      transition: all .2s ease;
    }
    .small:hover{ background:rgba(255,255,255,0.05); border-color:rgba(255,255,255,0.1); transform:translateY(-2px); }
    [data-theme="light"] .small{ 
      background:#ffffff; 
      border:1px solid rgba(11,114,255,0.08); 
      color:var(--muted-light);
    }
    [data-theme="light"] .small:hover{ 
      background:#f8fbff; 
      border-color:rgba(11,114,255,0.15);
      box-shadow:0 4px 12px rgba(11,114,255,0.08);
    }

    .share-group{ display:flex; gap:8px; align-items:center; }
    .share-group .btn{ min-height:auto; padding:10px 12px; }

    /* topbar */
    .topbar{ 
      position:fixed; top:20px; left:50%; transform:translateX(-50%); 
      display:flex; gap:10px; align-items:center; padding:10px 14px; 
      border-radius:999px; 
      background: rgba(255,255,255,0.03); 
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border:1px solid rgba(255,255,255,0.06); 
      z-index:40;
      box-shadow:0 8px 24px rgba(2,6,23,0.3);
      transition: all .3s ease;
    }
    .topbar:hover{ 
      background: rgba(255,255,255,0.05);
      box-shadow:0 12px 32px rgba(2,6,23,0.4);
      transform:translateX(-50%) translateY(-2px);
    }
    [data-theme="light"] .topbar{ 
      background:#ffffffdd; 
      border:1px solid rgba(11,114,255,0.1);
      box-shadow:0 8px 24px rgba(2,6,23,0.08);
    }
    [data-theme="light"] .topbar:hover{ 
      background:#ffffff;
      box-shadow:0 12px 32px rgba(2,6,23,0.12);
    }

    .topbar a{ 
      text-decoration:none; color:var(--accent-dark); font-weight:600; 
      display:flex; gap:6px; align-items:center; padding:8px 10px; 
      border-radius:10px; 
      transition: all .2s ease;
      font-size:14px;
    }
    .topbar a:hover{ 
      background:rgba(11,114,255,0.1); 
      transform:scale(1.1);
    }
    [data-theme="light"] .topbar a{ color:var(--accent); }
    [data-theme="light"] .topbar a:hover{ background:rgba(11,114,255,0.08); }

    /* visible theme buttons */
    .theme-toggle{ 
      display:inline-flex; gap:4px; border-radius:12px; padding:4px; 
      border:1px solid rgba(255,255,255,0.05); 
      background:rgba(255,255,255,0.03);
    }
    [data-theme="light"] .theme-toggle{ 
      border:1px solid rgba(11,114,255,0.08); 
      background:#eef6ff;
    }
    .theme-toggle button{ 
      border:0; background:transparent; padding:6px 12px; border-radius:8px; 
      cursor:pointer; font-weight:600; color:var(--accent-dark); 
      font-size:13px;
      transition: all .2s ease;
    }
    .theme-toggle button:hover{ background:rgba(255,255,255,0.05); }
    [data-theme="light"] .theme-toggle button{ color:var(--accent); }
    [data-theme="light"] .theme-toggle button:hover{ background:rgba(11,114,255,0.05); }
    .theme-toggle .active{ 
      background:var(--accent-dark); 
      color:#021; 
      padding:6px 12px; 
      border-radius:8px;
      box-shadow:0 2px 8px rgba(0,234,255,0.3);
    }
    [data-theme="light"] .theme-toggle .active{ 
      background:var(--accent); 
      color:#fff;
      box-shadow:0 2px 8px rgba(11,114,255,0.3);
    }

    /* Animations */
    .fade-in{ animation:fadeInUp .7s cubic-bezier(.16,.84,.32,1) both; }
    @keyframes fadeInUp{ 
      from{opacity:0; transform:translateY(20px) scale(0.95)} 
      to{opacity:1; transform:translateY(0) scale(1)} 
    }

    /* Stagger animation for buttons */
    .links .btn:nth-child(1){ animation-delay:.1s; }
    .links .btn:nth-child(2){ animation-delay:.15s; }
    .links .btn:nth-child(3){ animation-delay:.2s; }
    .links .btn:nth-child(4){ animation-delay:.25s; }
    .links .btn:nth-child(5){ animation-delay:.3s; }
    .links .btn:nth-child(6){ animation-delay:.35s; }

    /* responsiveness */
    @media (max-width:1024px){
      .card{ max-width:900px; padding:28px; gap:28px; }
      .profile{ min-width:240px; gap:18px; }
      .avatar{ width:115px; height:115px; }
    }
    @media (max-width:768px){
      body{ 
        padding:16px;
        padding-left:max(16px, env(safe-area-inset-left));
        padding-right:max(16px, env(safe-area-inset-right));
        padding-top:max(16px, env(safe-area-inset-top));
        padding-bottom:max(16px, env(safe-area-inset-bottom));
      }
      .card{ 
        /* keep desktop row layout on mobile, allow wrapping to stay neat */
        flex-direction:row; 
        flex-wrap:wrap;
        align-items:flex-start;
        gap:20px; 
        padding:22px; 
        max-width:100%;
        margin:0;
        width:100%;
      }
      .profile{ 
        width:100%; 
        gap:14px; 
        align-items:center; 
        flex-direction:row; 
        text-align:left;
        min-width:0;
      }
      .meta{ 
        align-items:flex-start; 
        text-align:left;
      }
      .links{ grid-template-columns:repeat(2, minmax(0,1fr)); gap:12px; width:100%; }
      .orb{ opacity:0.08; }
      .orb.orb-1{ width:300px; height:300px; }
      .orb.orb-2{ width:250px; height:250px; }
    }
    @media (max-width:640px){
      body{ 
        padding:14px;
        padding-left:max(14px, env(safe-area-inset-left));
        padding-right:max(14px, env(safe-area-inset-right));
        padding-top:max(14px, env(safe-area-inset-top));
        padding-bottom:max(14px, env(safe-area-inset-bottom));
      }
      .card{ 
        padding:18px; gap:16px; 
        width:100%;
        margin:0;
        flex-direction:row;
        flex-wrap:wrap;
        align-items:flex-start;
      }
      .profile{ 
        width:100%;
        gap:12px;
        flex-direction:row;
        align-items:center;
      }
      .avatar{ width:92px; height:92px; border-width:3px; }
      .name{ font-size:19px; }
      .role{ font-size:13px; }
      .typing{ font-size:15px; }
      .links{ grid-template-columns:repeat(2, minmax(0,1fr)); gap:10px; width:100%; }
      .btn{ 
        justify-content:flex-start; padding-left:16px; 
        min-height:52px;
      }
      .info-row{ gap:10px; }
      .small{ padding:8px 12px; font-size:12px; }
      .topbar{ 
        top:12px; padding:8px 12px; 
        gap:8px; font-size:12px;
        left:max(12px, env(safe-area-inset-left));
        right:max(12px, env(safe-area-inset-right));
        transform:translateX(-50%);
      }
      .topbar a{ padding:6px 8px; }
      .theme-toggle button{ padding:5px 10px; font-size:12px; }
    }
    @media (max-width:480px){
      body{ 
        padding:14px;
        padding-left:max(14px, env(safe-area-inset-left));
        padding-right:max(14px, env(safe-area-inset-right));
        padding-top:max(14px, env(safe-area-inset-top));
        padding-bottom:max(14px, env(safe-area-inset-bottom));
      }
      .card{ 
        padding:16px; gap:14px; border-radius:16px; 
        width:100%;
        margin:0;
        flex-direction:row;
        flex-wrap:wrap;
        align-items:flex-start;
      }
      .profile{ 
        width:100%;
        gap:10px;
        flex-direction:row;
        align-items:center;
      }
      .avatar{ width:84px; height:84px; }
      .name{ font-size:17px; letter-spacing:.3px; }
      .role{ font-size:12px; }
      .typing{ font-size:14px; min-height:20px; }
      .links{ grid-template-columns:repeat(2, minmax(0,1fr)); gap:10px; width:100%; }
      .btn{ 
        padding:12px 14px; font-size:13px; 
        min-height:48px;
      }
      .info-row{ 
        flex-direction:column; align-items:stretch; 
        gap:8px;
      }
      .small{ width:100%; justify-content:center; }
      .share-group{ justify-content:center; width:100%; }
      .topbar{ 
        display:none; 
      }
      .orb{ display:none; }
    }
    @media (max-width:360px){
      body{ 
        padding:12px;
        padding-left:max(12px, env(safe-area-inset-left));
        padding-right:max(12px, env(safe-area-inset-right));
        padding-top:max(12px, env(safe-area-inset-top));
        padding-bottom:max(12px, env(safe-area-inset-bottom));
      }
      .card{ 
        padding:14px; 
        width:100%;
        margin:0;
        gap:12px;
        flex-direction:row;
        flex-wrap:wrap;
        align-items:flex-start;
      }
      .avatar{ width:78px; height:78px; }
      .name{ font-size:16px; }
    }

    /* Touch improvements */
    @media (hover:none) and (pointer:coarse){
      .btn:active{ transform:scale(0.96); }
      .card:hover{ transform:none; }
    }

    /* High contrast mode support */
    @media (prefers-contrast:high){
      .btn{ border-width:2px; }
      .card{ border-width:2px; }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion:reduce){
      *, *::before, *::after{ animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; }
      .orb{ animation:none; }
    }
  </style>
</head>
<body>

  <!-- orbs -->
  <div class="orb orb-1" aria-hidden="true"></div>
  <div class="orb orb-2" aria-hidden="true"></div>

  <!-- top floating bar -->
  <div class="topbar" role="navigation" aria-label="social links and theme">
    <a href="https://github.com/Theerthananda" target="_blank" rel="noreferrer" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>
    <a href="https://www.linkedin.com/in/theerthananda" target="_blank" rel="noreferrer" aria-label="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
    <a href="https://www.instagram.com/__theerthananda__gowda__" target="_blank" rel="noreferrer" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>

    <div class="theme-toggle" role="group" aria-label="Theme toggle">
      <button id="lightBtn" title="Light mode">Light</button>
      <button id="darkBtn" title="Dark mode" class="active">Dark</button>
    </div>
  </div>

  <!-- main card -->
  <main class="card fade-in" role="main" aria-labelledby="profileName">
    <!-- left -->
    <div class="profile" aria-hidden="false">
      <div class="avatar" aria-hidden="true">
        <img src="me.jpeg" alt="Profile photo">
      </div>

          <button id="waBtn" class="btn" style="padding:8px 10px; min-height:auto;"><i class="fa-brands fa-whatsapp"></i></button>

  <script>
    // Smooth theme application with fade
    const lightBtn = document.getElementById('lightBtn');
    const darkBtn  = document.getElementById('darkBtn');

    function applyTheme(theme){
      // soft fade by toggling attribute (CSS transitions handle visuals)
      if(theme === 'light'){
        document.documentElement.setAttribute('data-theme','light');
        lightBtn.classList.add('active'); darkBtn.classList.remove('active');
      } else {
        document.documentElement.removeAttribute('data-theme');
        darkBtn.classList.add('active'); lightBtn.classList.remove('active');
      }
      localStorage.setItem('pref-theme', theme);
    }

    // initialize
    const savedTheme = localStorage.getItem('pref-theme') || 'dark';
    applyTheme(savedTheme);

    lightBtn.addEventListener('click', ()=> applyTheme('light'));
    darkBtn.addEventListener('click', ()=> applyTheme('dark'));

    /* Typing effect (short list: removed Open Source Lover) */
    (function typing(){
      const el = document.getElementById('typing');
      const words = ['Programmer','Developer','Tech Enthusiast','Problem Solver'];
      let i=0, j=0, dir=1;
      function loop(){
        el.textContent = words[i].slice(0,j);
        j += dir;
        if(j>words[i].length){ dir=-1; setTimeout(loop,900); return; }
        if(j===0){ dir=1; i=(i+1)%words.length; }
        setTimeout(loop,80);
      }
      loop();
    })();

    /* Visitor counter using CountAPI (fallback to local if blocked) */
    (function visitorCount(){
      const el = document.getElementById('visitorCount');
      const api = 'https://api.countapi.xyz/hit/theerthananda.dev/linktree';
      fetch(api).then(r=>r.json()).then(res=>{
        if(res && res.value) el.textContent = res.value;
        else el.textContent = '—';
      }).catch(e=>{
        let v = Number(localStorage.getItem('local_visit')||0)+1;
        localStorage.setItem('local_visit', v);
        el.textContent = v + ' (local)';
      });
    })();

    /* Resume auto-enable (HEAD) with animation */
    (function enableResume(){
      const btn = document.getElementById('resumeBtn');
      fetch('resume.pdf', { method: 'HEAD' }).then(r=>{
        if(r.ok){
          btn.classList.remove('resume-disabled');
          btn.removeAttribute('aria-disabled');
          btn.innerHTML = '<i class="fa-solid fa-file-arrow-down"></i> Download Resume';
          // small glow animation
          btn.animate([
            { boxShadow: '0 8px 30px rgba(11,114,255,0.08)' },
            { boxShadow: '0 18px 48px rgba(11,114,255,0.18)' },
            { boxShadow: '0 8px 30px rgba(11,114,255,0.08)' }
          ], { duration: 900, iterations: 1 });
        } else {
          btn.innerHTML = '<i class="fa-solid fa-file-arrow-down"></i> Resume (coming)';
        }
      }).catch(e=>{
        btn.innerHTML = '<i class="fa-solid fa-file-arrow-down"></i> Resume (coming)';
      });
    })();

    /* Share features: copy, whatsapp, native share */
    (function shareFeatures(){
      const copyBtn = document.getElementById('copyBtn');
      const waBtn = document.getElementById('waBtn');
      const native = document.getElementById('nativeShare');
      const url = window.location.href || 'https://theerthananda.github.io/';

      copyBtn.addEventListener('click', async ()=>{
        try{
          await navigator.clipboard.writeText(url);
          copyBtn.animate([{ transform:'scale(1)' },{ transform:'scale(0.92)' },{ transform:'scale(1)' }], { duration:220 });
          copyBtn.title = 'Copied!';
        }catch(e){
          copyBtn.title = 'Copy failed';
        }
      });

      waBtn.addEventListener('click', ()=>{
        const text = encodeURIComponent('Check out Theerthananda — Dev Links: ' + url);
        const wa = `https://wa.me/?text=${text}`;
        window.open(wa,'_blank');
      });

      native.addEventListener('click', async ()=>{
        if(navigator.share){
          try{
            await navigator.share({ title: 'Theerthananda — Dev Links', text: 'Open developer links', url });
          }catch(e){
            // user dismissed
          }
        } else {
          // fallback: copy link
          try{ await navigator.clipboard.writeText(url); native.title='Link copied'; }catch(e){ native.title='Share not available'; }
        }
      });
    })();

    /* Accessibility: keyboard handlers for theme toggle */
    lightBtn.addEventListener('keyup', (e)=> { if(e.key === 'Enter') applyTheme('light'); });
    darkBtn.addEventListener('keyup', (e)=> { if(e.key === 'Enter') applyTheme('dark'); });

  </script>
